{% extends 'base.html' %}
{% block title %}{{ 'Editar' if imovel else 'Novo' }} Imóvel{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('imoveis') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">
    <i class="bi bi-building me-2 text-primary"></i>
    {{ 'Editar Imóvel' if imovel else 'Novo Imóvel' }}
  </h4>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nome do Imóvel <span class="text-muted small fw-normal">(como você identifica, ex: Apto 304, Casa Cirilo)</span></label>
            <input type="text" name="nome" class="form-control"
                   value="{{ imovel.nome or '' if imovel else '' }}" placeholder="Ex: Apto Tussi, Apto 304...">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Endereço <span class="text-danger">*</span></label>
            <input type="text" name="endereco" class="form-control" required
                   value="{{ imovel.endereco if imovel }}" placeholder="Rua, número...">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Complemento</label>
            <input type="text" name="complemento" class="form-control"
                   value="{{ imovel.complemento or '' if imovel else '' }}" placeholder="Apto, sala...">
          </div>
          <div class="row g-3 mb-3">
            <div class="col-6">
              <label class="form-label fw-semibold">Bairro</label>
              <input type="text" name="bairro" class="form-control"
                     value="{{ imovel.bairro or '' if imovel else '' }}">
            </div>
            <div class="col-6">
              <label class="form-label fw-semibold">Cidade</label>
              <input type="text" name="cidade" class="form-control"
                     value="{{ imovel.cidade or '' if imovel else '' }}">
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Descrição</label>
            <textarea name="descricao" class="form-control" rows="3"
                      placeholder="Observações sobre o imóvel...">{{ imovel.descricao or '' if imovel else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="bi bi-check-lg me-1"></i>Salvar
            </button>
            <a href="{{ url_for('imoveis') }}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
