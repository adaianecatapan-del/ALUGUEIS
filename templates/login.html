<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar - Controle de Aluguéis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #1e3a5f 0%, #0d6efd 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-card { border: none; border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.25); max-width: 380px; width: 100%; }
    .login-icon { font-size: 2.5rem; color: #0d6efd; }
  </style>
</head>
<body>
  <div class="login-card card p-4 m-3">
    <div class="card-body">
      <div class="text-center mb-4">
        <i class="bi bi-house-heart-fill login-icon"></i>
        <h4 class="fw-bold mt-2 mb-0">Controle de Aluguéis</h4>
        <p class="text-muted small">Entre para acessar o sistema</p>
      </div>

      {% if erro %}
      <div class="alert alert-danger py-2 small" role="alert">
        <i class="bi bi-exclamation-triangle me-1"></i>{{ erro }}
      </div>
      {% endif %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuário</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" name="usuario" class="form-control" required autofocus autocomplete="username">
          </div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" name="senha" class="form-control" required autocomplete="current-password">
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100 fw-semibold">
          <i class="bi bi-box-arrow-in-right me-1"></i>Entrar
        </button>
      </form>
    </div>
  </div>
</body>
</html>
