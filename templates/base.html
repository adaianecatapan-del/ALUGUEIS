<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Aluguéis{% endblock %} - Controle de Aluguéis</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body { background-color: #f4f6f9; }
    .navbar-brand { font-weight: 700; letter-spacing: 0.5px; }
    .sidebar { min-height: calc(100vh - 56px); background: #1e3a5f; }
    .sidebar .nav-link { color: rgba(255,255,255,0.8); padding: 10px 20px; border-radius: 8px; margin: 2px 8px; }
    .sidebar .nav-link:hover, .sidebar .nav-link.active { background: rgba(255,255,255,0.15); color: #fff; }
    .sidebar .nav-link i { width: 22px; }
    .sidebar-heading { color: rgba(255,255,255,0.4); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; padding: 12px 20px 4px; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,0.07); border-radius: 12px; }
    .card-stat { border-left: 4px solid; }
    .badge-pago { background-color: #198754; }
    .badge-pendente { background-color: #ffc107; color: #000; }
    .badge-atrasado { background-color: #dc3545; }
    .table th { font-size: 0.82rem; text-transform: uppercase; color: #6c757d; font-weight: 600; }
    .btn-sm { font-size: 0.78rem; }
    @media (max-width: 767px) {
      .sidebar { min-height: auto; }
      .sidebar-label { display: none; }
    }
  </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary navbar-expand-lg">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{ url_for('index') }}">
      <i class="bi bi-house-heart-fill me-2"></i>Aluguéis
    </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item">
          <a class="nav-link {% if request.endpoint == 'index' %}active{% endif %}" href="{{ url_for('index') }}">
            <i class="bi bi-speedometer2 me-1"></i>Dashboard
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'imovel' in request.endpoint %}active{% endif %}" href="{{ url_for('imoveis') }}">
            <i class="bi bi-building me-1"></i>Imóveis
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'inquilino' in request.endpoint %}active{% endif %}" href="{{ url_for('inquilinos') }}">
            <i class="bi bi-people me-1"></i>Inquilinos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'pagamento' in request.endpoint %}active{% endif %}" href="{{ url_for('pagamentos') }}">
            <i class="bi bi-cash-stack me-1"></i>Pagamentos
          </a>
        </li>
        <li class="nav-item">
          <a class="nav-link {% if 'relatorio' in request.endpoint %}active{% endif %}" href="{{ url_for('relatorios') }}">
            <i class="bi bi-bar-chart me-1"></i>Relatórios
          </a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="container-fluid py-4 px-3 px-md-4">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in messages %}
      <div class="alert alert-{{ 'success' if cat == 'success' else 'warning' if cat == 'warning' else 'info' }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endwith %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
