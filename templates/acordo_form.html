{% extends 'base.html' %}
{% block title %}{{ 'Editar' if acordo else 'Novo' }} Acordo{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{{ url_for('acordos') }}" class="btn btn-outline-secondary btn-sm me-3">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h4 class="fw-bold mb-0">
    <i class="bi bi-file-earmark-text me-2 text-primary"></i>
    {{ 'Editar Acordo' if acordo else 'Novo Acordo Judicial' }}
  </h4>
</div>

<div class="row justify-content-center">
  <div class="col-12 col-md-8 col-lg-6">
    <div class="card">
      <div class="card-body p-4">
        <form method="post">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nº do Processo</label>
            <input type="text" name="processo" class="form-control"
                   value="{{ acordo.processo or '' if acordo else '' }}" placeholder="0000000-00.0000.0.00.0000">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Credor <span class="text-danger">*</span></label>
            <input type="text" name="credor" class="form-control" required
                   value="{{ acordo.credor if acordo else '' }}" placeholder="Quem vai receber">
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Devedor <span class="text-danger">*</span></label>
            <input type="text" name="devedor" class="form-control" required
                   value="{{ acordo.devedor if acordo else '' }}" placeholder="Quem deve pagar">
          </div>
          <div class="row g-3 mb-3">
            <div class="col-12 col-sm-8">
              <label class="form-label fw-semibold">Advogado</label>
              <input type="text" name="advogado" class="form-control"
                     value="{{ acordo.advogado or '' if acordo else '' }}" placeholder="Nome — OAB/UF">
            </div>
            <div class="col-12 col-sm-4">
              <label class="form-label fw-semibold">Honorários (%)</label>
              <div class="input-group">
                <input type="number" name="honorarios_pct" class="form-control" step="0.01" min="0" max="100"
                       value="{{ acordo.honorarios_pct if acordo else '0' }}">
                <span class="input-group-text">%</span>
              </div>
            </div>
          </div>
          {% if acordo %}
          <div class="mb-3">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="ativo" id="ativo"
                     {% if acordo.ativo %}checked{% endif %}>
              <label class="form-check-label" for="ativo">Acordo ativo</label>
            </div>
          </div>
          {% endif %}
          <div class="mb-4">
            <label class="form-label fw-semibold">Observações</label>
            <textarea name="observacao" class="form-control" rows="2">{{ acordo.observacao or '' if acordo else '' }}</textarea>
          </div>
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary flex-fill">
              <i class="bi bi-check-lg me-1"></i>Salvar
            </button>
            <a href="{{ url_for('acordos') }}" class="btn btn-outline-secondary flex-fill">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
